<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
    <title>Numa Live Controller</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#121212">
    <meta name="mobile-web-app-capable" content="yes">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <style>
        :root {
            --bg: #121212;
            --surface: #1e1e1e;
            --primary: #2a9d8f;
            --primary-dark: #21867a;
            --accent: #e9c46a;
            --text: #ffffff;
            --text-muted: #aaaaaa;
        }
        
        * { box-sizing: border-box; }
        body { font-family: sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        
        /* HEADER: Stato MIDI */
        header { background: #000; padding: 10px; border-bottom: 1px solid #333; display: flex; flex-wrap: wrap; gap: 10px; align-items: center; justify-content: space-between; font-size: 14px; }
        .midi-controls { display: flex; gap: 10px; flex: 1; }
        select { background: #333; color: white; border: 1px solid #555; padding: 5px; border-radius: 4px; }
        #status-indicator { color: #ee9b00; font-weight: bold; }

        /* CONTENITORE PRINCIPALE */
        #main-container { flex: 1; padding: 15px; display: flex; flex-direction: column; overflow: hidden; }
        
        /* VISTA 1: Lista Concerti */
        #view-concerts { display: none; flex-direction: column; gap: 15px; height: 67%; overflow-y: auto; min-height: 0; }
        .concert-card { background: var(--surface); padding: 25px; border-radius: 12px; font-size: 20px; text-align: center; border: 2px solid #333; cursor: pointer; transition: 0.2s; }
        .concert-card:active { border-color: var(--primary); background: #2a2a2a; }

        /* VISTA 2: Modalità Live */
        #view-live { display: none; flex-direction: column; height: 67%; overflow: hidden; min-height: 0; }
        .live-controls-wrapper { height: 100%; display: flex; flex-direction: column; min-height: 0; }
        .song-header { text-align: center; margin-bottom: 15px; }
        .song-title { font-size: 28px; font-weight: bold; margin: 0; color: var(--accent); }
        .song-index { font-size: 14px; color: var(--text-muted); }

        #patches-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 15px; flex: 1; align-content: start; overflow-y: auto; padding-right: 5px; }
        
        .pad { background: var(--primary); border: 2px solid var(--primary-dark); padding: 20px 10px; font-size: 20px; color: white; border-radius: 12px; text-align: center; cursor: pointer; user-select: none; box-shadow: 0 4px 6px rgba(0,0,0,0.3); transition: transform 0.1s, background-color 0.2s; }
        .pad:active { background: var(--accent); border-color: #f4a261; color: #000; transform: translateY(2px); }
        .pad.active { background: var(--accent); border-color: #f4a261; color: #000; box-shadow: 0 0 12px var(--accent); }
        .pad.dragging { opacity: 0.4; border: 2px dashed var(--accent); background: #333; transform: scale(0.95); }
        .preset-number { font-size: 14px; opacity: 0.9; display: block; margin-top: 8px; font-family: monospace; }

        /* NAVIGAZIONE INFERIORE */
        .live-nav { display: flex; justify-content: space-between; padding-top: 10px; margin-top: auto; border-top: 1px solid #333; margin-bottom: 5px; }
        .nav-btn { background: var(--surface); color: white; border: 1px solid #555; padding: 12px 15px; border-radius: 8px; font-size: 16px; cursor: pointer; flex: 1; margin: 0 5px; text-align: center; }
        .nav-btn:active { background: #444; }
        .nav-btn.primary { background: #005f73; border-color: #0a9396; }

        /* MONITOR TERMINALE IN BASSO */
        .terminal-wrapper {
            height: 33%;
            display: flex;
            flex-direction: column;
            background: #08080c;
            border: 2px solid #222;
            border-radius: 8px;
            overflow: hidden;
            min-height: 0;
            margin-top: 10px;
            font-family: 'Courier New', Courier, monospace;
            box-shadow: inset 0 0 15px rgba(0,0,0,0.9), 0 4px 10px rgba(0,0,0,0.5);
        }
        .terminal-header {
            background: #12121a;
            padding: 8px 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #222;
        }
        .terminal-title {
            font-size: 11px;
            font-weight: bold;
            color: #888;
            letter-spacing: 1.5px;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .terminal-title::before {
            content: '';
            display: inline-block;
            width: 8px;
            height: 8px;
            background: #39ff14;
            border-radius: 50%;
            box-shadow: 0 0 8px #39ff14;
            animation: pulse-glow 1.5s infinite;
        }
        @keyframes pulse-glow {
            0% { opacity: 0.4; }
            50% { opacity: 1; }
            100% { opacity: 0.4; }
        }
        .terminal-clear {
            background: transparent;
            border: 1px solid #444;
            color: #aaa;
            padding: 2px 8px;
            font-size: 10px;
            border-radius: 4px;
            cursor: pointer;
            font-family: inherit;
            transition: all 0.2s;
        }
        .terminal-clear:hover {
            border-color: #ff3333;
            color: #ff3333;
            background: rgba(255, 51, 51, 0.1);
        }
        .terminal-body {
            flex: 1;
            padding: 10px;
            overflow-y: auto;
            font-size: 13px;
            line-height: 1.4;
            display: flex;
            flex-direction: column;
            gap: 4px;
        }
        .terminal-body::-webkit-scrollbar {
            width: 6px;
        }
        .terminal-body::-webkit-scrollbar-track {
            background: rgba(0, 0, 0, 0.2);
        }
        .terminal-body::-webkit-scrollbar-thumb {
            background: #333;
            border-radius: 3px;
        }
        .terminal-body::-webkit-scrollbar-thumb:hover {
            background: #555;
        }
        .terminal-line {
            word-break: break-all;
        }
        .terminal-line.info { color: #00f0ff; }
        .terminal-line.success { color: #39ff14; text-shadow: 0 0 2px rgba(57, 255, 20, 0.3); }
        .terminal-line.error { color: #ff3333; text-shadow: 0 0 2px rgba(255, 51, 51, 0.3); }
        .terminal-line.warning { color: #ffaa00; }
        .terminal-line.system { color: #888899; }
        .term-time { color: #555566; margin-right: 6px; }
    </style>
</head>
<body>

    <header>
        <div class="midi-controls">
            <select id="midi-out-select" onchange="onKeyboardSelectChange()"><option>Cerco tastiera...</option></select>
            <button id="btn-connetti-midi" onclick="inizializzaMidi()" style="background: var(--accent); color: #000; border: none; padding: 5px 12px; border-radius: 4px; font-weight: bold; cursor: pointer; font-size: 12px; transition: all 0.2s;">CONNETTI MIDI</button>
            <select id="midi-channel">
                <script>for(let i=0; i<16; i++) document.write(`<option value="${i}">CH ${i+1}</option>`);</script>
            </select>
        </div>
        <div style="display: flex; flex-direction: column; align-items: flex-end; gap: 2px;">
            <div id="status-indicator">In attesa...</div>
            <div style="display: flex; align-items: center; gap: 8px;">
                <div id="app-version" style="font-size: 18px; color: #666; font-family: monospace; letter-spacing: 0.5px;">v0.0.0</div>
                <button onclick="aggiornaApplicazione()" style="background: none; border: none; color: var(--accent); cursor: pointer; font-size: 18px; padding: 2px; display: flex; align-items: center; justify-content: center;" title="Aggiorna applicazione">🔄</button>
            </div>
        </div>
    </header>

    <div id="main-container">
        <div id="view-concerts">
            <h2 style="text-align:center; margin-top:0;">Seleziona Concerto</h2>
            <div id="concerts-list"></div>
        </div>

        <div id="view-live">
            <div class="live-controls-wrapper">
                <div class="song-header">
                    <h2 id="current-song-title" class="song-title">Titolo Canzone</h2>
                    <div id="song-counter" class="song-index">Brano 1 di X</div>
                </div>
                
                <div id="patches-grid"></div>
                
                <div class="action-bar-wrapper" style="display: flex; justify-content: flex-start; padding: 5px 0 10px 0;">
                    <div id="trash-add-btn" style="display: none; width: 60px; height: 60px; border-radius: 50%; font-size: 28px; justify-content: center; align-items: center; cursor: pointer; transition: all 0.2s; box-shadow: 0 4px 10px rgba(0,0,0,0.5); border: 2px solid #555; user-select: none;"></div>
                </div>

                <div class="live-nav">
                    <div id="btn-prev-song" class="nav-btn" onclick="changeSong(-1)">◄ Brano Prec</div>
                    <div class="nav-btn primary" onclick="showConcerts()">Cambia Live</div>
                    <div id="btn-next-song" class="nav-btn" onclick="changeSong(1)">Brano Succ ►</div>
                </div>
            </div>
        </div>

        <div class="terminal-wrapper">
            <div class="terminal-header">
                <span class="terminal-title">MIDI MONITOR LOG</span>
                <button class="terminal-clear" onclick="clearTerminal()">CANCELLA</button>
            </div>
            <div id="terminal-body" class="terminal-body">
                <div class="terminal-line system"><span class="term-time"></span>Terminale pronto. In attesa di comandi MIDI...</div>
            </div>
        </div>
    </div>

    <!-- Modal per l'inserimento del nome della patch -->
    <div id="patch-name-modal" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.75); z-index: 2000; justify-content: center; align-items: center; backdrop-filter: blur(4px);">
        <div style="background: var(--surface); border: 2px solid var(--primary-dark); padding: 25px; border-radius: 16px; width: 90%; max-width: 400px; box-shadow: 0 10px 25px rgba(0,0,0,0.6); text-align: center;">
            <h3 style="margin-top: 0; color: var(--accent); font-size: 22px; font-family: Outfit, sans-serif;" id="modal-title">Nuovo Suono Rilevato</h3>
            <p style="color: var(--text-muted); font-size: 14px; margin-bottom: 20px; line-height: 1.4;" id="modal-subtitle">Inserisci il nome per il preset</p>
            <input type="text" id="modal-input-name" style="width: 100%; padding: 12px; border-radius: 8px; border: 1px solid #444; background: #222; color: #fff; font-size: 16px; margin-bottom: 25px; box-sizing: border-box; text-align: center;" placeholder="Nome del preset (es. Piano e Pad)">
            <div style="display: flex; justify-content: space-between; gap: 15px;">
                <button type="button" onclick="chiudiModalPatch(false)" style="flex: 1; padding: 12px; border-radius: 8px; border: 1px solid #555; background: transparent; color: #fff; cursor: pointer; font-size: 14px; transition: background 0.2s;">Annulla</button>
                <button type="button" onclick="chiudiModalPatch(true)" style="flex: 1; padding: 12px; border-radius: 8px; border: none; background: var(--accent); color: #000; font-weight: bold; cursor: pointer; font-size: 14px; transition: background 0.2s;">Conferma</button>
            </div>
        </div>
    </div>

    <script>
        // ==========================================
        // STATO DELL'APPLICAZIONE
        // ==========================================
        const APP_VERSION = "2026.07.14-2321";
        
        // Logger globale per catturare e mostrare a schermo eventuali errori JS
        window.onerror = function(message, source, lineno, colno, error) {
            logToTerminal(`ERRORE JS: ${message} (linea ${lineno})`, "error");
            return false;
        };
        window.onunhandledrejection = function(event) {
            logToTerminal(`PROMISE KO: ${event.reason}`, "error");
        };

        let database = null;
        let activeConcert = null;
        let currentSongIndex = 0;
        let globalMidiAccess = null;
        let activePresetNum = null;
        let patchLookup = {};
        
        // Stato per il drag and drop touch
        let draggedPatchIndex = null;
        let lastTouchTarget = null;

        // ==========================================
        // GESTIONE DATI (JSON)
        // ==========================================
        async function loadDatabase() {
            try {
                updateStatus("Caricamento dati...", "#ee9b00");
                
                // 1. Carica i nomi delle patch da settings.json
                const settingsRes = await fetch('settings.json?_t=' + Date.now());
                if (!settingsRes.ok) throw new Error("File settings.json non trovato");
                const settingsData = await settingsRes.json();
                
                // Salva l'intera struttura (che contiene "keyboards")
                patchLookup = settingsData || { keyboards: {} };
                if (!patchLookup.keyboards) patchLookup.keyboards = {};
                
                // Unisci con la lookup personalizzata salvata in localStorage
                const localLookup = localStorage.getItem('midiLive_patchLookup');
                if (localLookup) {
                    const parsedLocal = JSON.parse(localLookup);
                    if (parsedLocal.keyboards) {
                        // Nuovo formato strutturato
                        for (const kb in parsedLocal.keyboards) {
                            if (!patchLookup.keyboards[kb]) {
                                patchLookup.keyboards[kb] = { patches: {} };
                            }
                            Object.assign(patchLookup.keyboards[kb].patches, parsedLocal.keyboards[kb].patches);
                        }
                    } else {
                        // Vecchio formato piatto: lo associamo a una tastiera virtuale "Tastiera Temporanea"
                        // per garantire la retrocompatibilità fino alla prima migrazione differita.
                        if (!patchLookup.keyboards["Tastiera Temporanea"]) {
                            patchLookup.keyboards["Tastiera Temporanea"] = { patches: {} };
                        }
                        Object.assign(patchLookup.keyboards["Tastiera Temporanea"].patches, parsedLocal);
                    }
                }
                
                // 2. Carica la scaletta dei concerti da localStorage o da server
                const localDb = localStorage.getItem('midiLive_database');
                if (localDb) {
                    database = JSON.parse(localDb);
                    logToTerminal("Database caricato dalla memoria locale.", "system");
                } else {
                    const dbRes = await fetch('setlists.json?_t=' + Date.now());
                    if (!dbRes.ok) throw new Error("File setlists.json non trovato");
                    database = await dbRes.json();
                    
                    // Inizializza localStorage
                    localStorage.setItem('midiLive_database', JSON.stringify(database));
                    logToTerminal("Database scaricato da GitHub e salvato in locale.", "system");
                }
                
                showConcerts();
                updateStatus("Dati caricati", "#a7c957");
            } catch (error) {
                updateStatus("Errore caricamento!", "#ae2012");
                alert("Impossibile caricare i dati. Assicurati di aver pushato settings.json e setlists.json su GitHub.\n\n" + error.message);
            }
        }

        // ==========================================
        // GESTIONE INTERFACCIA UTENTE
        // ==========================================
        function showConcerts() {
            document.getElementById('view-live').style.display = 'none';
            document.getElementById('view-concerts').style.display = 'flex';
            
            const list = document.getElementById('concerts-list');
            list.innerHTML = ''; // Svuota
            
            database.concerts.forEach((concert, index) => {
                const card = document.createElement('div');
                card.className = 'concert-card';
                card.innerHTML = `<strong>${concert.name}</strong><br><small>${concert.songs.length} brani</small>`;
                card.onclick = () => startConcert(index);
                list.appendChild(card);
            });
        }

        function startConcert(concertIndex) {
            activeConcert = database.concerts[concertIndex];
            currentSongIndex = 0;
            
            const firstSong = activeConcert.songs[0];
            if (firstSong && firstSong.patches && firstSong.patches.length > 0) {
                const firstPatch = firstSong.patches[0];
                activePresetNum = firstPatch.presetNum;
                sendPC(firstPatch.presetNum);
            } else {
                activePresetNum = null;
            }
            
            document.getElementById('view-concerts').style.display = 'none';
            document.getElementById('view-live').style.display = 'flex';
            renderCurrentSong();
        }

        function renderCurrentSong() {
            const song = activeConcert.songs[currentSongIndex];
            
            // Aggiorna Intestazione
            document.getElementById('current-song-title').innerText = song.title;
            document.getElementById('song-counter').innerText = `Brano ${currentSongIndex + 1} di ${activeConcert.songs.length}`;

            // Genera i Pad delle Patch
            const grid = document.getElementById('patches-grid');
            grid.innerHTML = '';
            
            // Consenti il drop sullo sfondo della griglia per aggiungere in coda
            grid.ondragover = (e) => {
                e.preventDefault();
            };
            grid.ondrop = (e) => {
                e.preventDefault();
                const dragData = e.dataTransfer.getData('text/plain');
                if (dragData === 'new-patch') {
                    if (e.target === grid || e.target.id === 'patches-grid') {
                        aggiungiPatchInPosizione(-1);
                    }
                }
            };
            
            if(song.patches && song.patches.length > 0) {
                song.patches.forEach((patch, index) => {
                    const btn = document.createElement('div');
                    btn.className = 'pad';
                    btn.id = `patch-pad-${patch.presetNum}`;
                    btn.dataset.index = index; // Memorizza l'indice per il riposizionamento
                    
                    const patchName = getPatchName(patch.presetNum);
                    btn.innerHTML = `${patchName} <span class="preset-number">PC: ${patch.presetNum}</span>`;
                    
                    // Selezione patch
                    btn.onclick = () => {
                        sendPC(patch.presetNum);
                        selezionaPadGUI(patch.presetNum);
                    };
                    
                    // Drag and Drop (Desktop / Mouse)
                    btn.setAttribute('draggable', 'true');
                    btn.ondragstart = (e) => {
                        e.dataTransfer.setData('text/plain', index);
                        btn.classList.add('dragging');
                    };
                    btn.ondragend = () => {
                        btn.classList.remove('dragging');
                    };
                    btn.ondragover = (e) => {
                        e.preventDefault();
                    };
                    btn.ondrop = (e) => {
                        e.preventDefault();
                        const dragData = e.dataTransfer.getData('text/plain');
                        if (dragData === 'new-patch') {
                            aggiungiPatchInPosizione(index);
                        } else {
                            const fromIndex = parseInt(dragData);
                            if (!isNaN(fromIndex) && fromIndex !== index) {
                                spostaPatch(fromIndex, index);
                            }
                        }
                    };

                    // Drag and Drop (Mobile / Touch)
                    btn.ontouchstart = (e) => {
                        handleTouchStart(e, index);
                    };
                    btn.ontouchmove = (e) => {
                        handleTouchMove(e);
                    };
                    btn.ontouchend = (e) => {
                        handleTouchEnd(e);
                    };

                    if (activePresetNum === patch.presetNum) {
                        btn.classList.add('active');
                    }
                    grid.appendChild(btn);
                });
            } else {
                grid.innerHTML = '<div style="width:100%; text-align:center; color:#aaa;">Nessuna patch per questo brano.</div>';
            }

            // Calcola i brani precedente e successivo
            const prevSong = activeConcert.songs[currentSongIndex - 1];
            const nextSong = activeConcert.songs[currentSongIndex + 1];

            const btnPrev = document.getElementById('btn-prev-song');
            const btnNext = document.getElementById('btn-next-song');

            if (btnPrev) {
                if (prevSong) {
                    btnPrev.innerHTML = `◄ ${prevSong.title}`;
                    btnPrev.style.opacity = '1';
                    btnPrev.style.pointerEvents = 'auto';
                } else {
                    btnPrev.innerHTML = `◄ (Inizio)`;
                    btnPrev.style.opacity = '0.3';
                    btnPrev.style.pointerEvents = 'none';
                }
            }

            if (btnNext) {
                if (nextSong) {
                    btnNext.innerHTML = `${nextSong.title} ►`;
                    btnNext.style.opacity = '1';
                    btnNext.style.pointerEvents = 'auto';
                } else {
                    btnNext.innerHTML = `(Fine) ►`;
                    btnNext.style.opacity = '0.3';
                    btnNext.style.pointerEvents = 'none';
                }
            }
            
            // Aggiorna pulsante azione
            aggiornaPulsanteAzione();
            
            // Associa drag & drop desktop per il cestino
            const actionBtn = document.getElementById('trash-add-btn');
            if (actionBtn) {
                actionBtn.ondragover = (e) => {
                    e.preventDefault();
                    actionBtn.style.transform = 'scale(1.15)';
                };
                actionBtn.ondragleave = () => {
                    actionBtn.style.transform = '';
                };
                actionBtn.ondrop = (e) => {
                    e.preventDefault();
                    actionBtn.style.transform = '';
                    const fromIndex = parseInt(e.dataTransfer.getData('text/plain'));
                    if (!isNaN(fromIndex)) {
                        eliminaPatch(fromIndex);
                    }
                };
            }
        }

        function changeSong(direction) {
            const newIndex = currentSongIndex + direction;
            if (newIndex >= 0 && newIndex < activeConcert.songs.length) {
                currentSongIndex = newIndex;
                
                const newSong = activeConcert.songs[currentSongIndex];
                if (newSong.patches && newSong.patches.length > 0) {
                    const firstPatch = newSong.patches[0];
                    activePresetNum = firstPatch.presetNum;
                    sendPC(firstPatch.presetNum);
                } else {
                    activePresetNum = null;
                }
                
                renderCurrentSong();
            }
        }

        function selezionaPadGUI(presetNum) {
            activePresetNum = presetNum;
            const pads = document.querySelectorAll('.pad');
            pads.forEach(pad => pad.classList.remove('active'));
            const activePad = document.getElementById(`patch-pad-${presetNum}`);
            if (activePad) {
                activePad.classList.add('active');
            }
            aggiornaPulsanteAzione();
        }

        function sincronizzaMidiInputConGUI(presetNum) {
            if (!activeConcert || !activeConcert.songs[currentSongIndex]) return;
            const song = activeConcert.songs[currentSongIndex];
            const patch = song.patches.find(p => p.presetNum === presetNum);
            if (patch) {
                selezionaPadGUI(presetNum);
                const patchName = getPatchName(presetNum);
                logToTerminal(`Sincronizzazione GUI: Rilevata selezione di "${patchName}" (PC ${presetNum}) dalla tastiera.`, "info");
            } else {
                activePresetNum = presetNum;
                const pads = document.querySelectorAll('.pad');
                pads.forEach(pad => pad.classList.remove('active'));
                const patchName = getPatchName(presetNum);
                logToTerminal(`Rilevato preset esterno: "${patchName}" (PC ${presetNum}) dalla tastiera.`, "warning");
            }
            aggiornaPulsanteAzione();
        }

        // ==========================================
        // DRAG AND DROP & TOUCH REORDERING LOGIC
        // ==========================================
        function spostaPatch(fromIndex, toIndex) {
            if (!activeConcert || !activeConcert.songs[currentSongIndex]) return;
            const song = activeConcert.songs[currentSongIndex];
            if (!song.patches || fromIndex < 0 || toIndex < 0 || fromIndex >= song.patches.length || toIndex >= song.patches.length) return;

            // Riorganizza l'array
            const [movedPatch] = song.patches.splice(fromIndex, 1);
            song.patches.splice(toIndex, 0, movedPatch);

            // Salva in localStorage
            try {
                localStorage.setItem('midiLive_database', JSON.stringify(database));
                logToTerminal(`Ordinamento modificato: Spostata patch in posizione ${toIndex + 1}.`, "info");
            } catch (err) {
                console.error("Errore salvataggio localStorage:", err);
            }

            // Ridisegna la canzone corrente
            renderCurrentSong();
        }

        function handleTouchStart(e, index) {
            draggedPatchIndex = index;
            e.currentTarget.classList.add('dragging');
        }

        function handleTouchMove(e) {
            e.preventDefault(); // Impedisce lo scorrimento
            const touch = e.touches[0];
            const target = document.elementFromPoint(touch.clientX, touch.clientY);
            
            // Ripristina l'hover di tutti i pad e del cestino
            const pads = document.querySelectorAll('.pad');
            pads.forEach(pad => pad.style.transform = '');
            const actionBtn = document.getElementById('trash-add-btn');
            if (actionBtn) actionBtn.style.transform = '';

            if (target) {
                const pad = target.closest('.pad');
                const btnAction = target.closest('#trash-add-btn');
                
                if (pad && pad !== e.currentTarget) {
                    pad.style.transform = 'scale(1.05)';
                    lastTouchTarget = pad;
                } else if (btnAction) {
                    btnAction.style.transform = 'scale(1.15)';
                    lastTouchTarget = btnAction;
                } else {
                    lastTouchTarget = null;
                }
            }
        }

        function handleTouchEnd(e) {
            e.currentTarget.classList.remove('dragging');
            
            const pads = document.querySelectorAll('.pad');
            pads.forEach(pad => pad.style.transform = '');
            const actionBtn = document.getElementById('trash-add-btn');
            if (actionBtn) actionBtn.style.transform = '';

            if (lastTouchTarget && draggedPatchIndex !== null) {
                if (lastTouchTarget.id === 'trash-add-btn') {
                    if (draggedPatchIndex !== 'new-patch') {
                        eliminaPatch(draggedPatchIndex);
                    }
                } else {
                    const toIndex = parseInt(lastTouchTarget.dataset.index);
                    if (!isNaN(toIndex)) {
                        if (draggedPatchIndex === 'new-patch') {
                            aggiungiPatchInPosizione(toIndex);
                        } else if (toIndex !== draggedPatchIndex) {
                            spostaPatch(draggedPatchIndex, toIndex);
                        }
                    }
                }
            }
            draggedPatchIndex = null;
            lastTouchTarget = null;
        }

        function aggiornaPulsanteAzione() {
            const actionBtn = document.getElementById('trash-add-btn');
            if (!actionBtn) return;
            
            if (!activeConcert || !activeConcert.songs[currentSongIndex] || activePresetNum === null) {
                actionBtn.style.display = 'none';
                return;
            }
            
            const song = activeConcert.songs[currentSongIndex];
            const isPatchInSong = song.patches && song.patches.some(p => p.presetNum === activePresetNum);
            
            actionBtn.style.display = 'flex';
            actionBtn.style.transform = ''; // Resetta eventuale zoom
            
            if (isPatchInSong) {
                // Stato: Cestino (Cerchio Rosso)
                actionBtn.innerHTML = '🗑️';
                actionBtn.style.background = '#ae2012';
                actionBtn.style.borderColor = '#d90429';
                actionBtn.style.color = '#fff';
                actionBtn.title = "Trascina qui una patch per eliminarla";
                actionBtn.onclick = null;
                actionBtn.setAttribute('draggable', 'false');
                actionBtn.ontouchstart = null;
                actionBtn.ontouchmove = null;
                actionBtn.ontouchend = null;
                
                // Ripristina stile circolare
                actionBtn.style.width = '60px';
                actionBtn.style.height = '60px';
                actionBtn.style.borderRadius = '50%';
                actionBtn.style.fontSize = '28px';
                actionBtn.style.padding = '0';
                actionBtn.style.borderStyle = 'solid';
            } else {
                // Stato: Aggiungi (Pad Rettangolare Tratteggiato)
                const patchName = getPatchName(activePresetNum);
                actionBtn.innerHTML = `➕ ${patchName} <span class="preset-number" style="display:inline; margin-top:0; font-size:12px; margin-left:6px; opacity:0.8;">PC: ${activePresetNum}</span>`;
                actionBtn.style.background = 'rgba(42, 157, 143, 0.25)';
                actionBtn.style.borderColor = '#2a9d8f';
                actionBtn.style.color = '#fff';
                actionBtn.title = "Trascina nella griglia o fai clic per aggiungere questa patch";
                actionBtn.onclick = () => aggiungiPatchCorrente();
                
                // Stile rettangolare tipo Pad
                actionBtn.style.width = 'auto';
                actionBtn.style.height = 'auto';
                actionBtn.style.minWidth = '160px';
                actionBtn.style.borderRadius = '12px';
                actionBtn.style.fontSize = '16px';
                actionBtn.style.padding = '12px 18px';
                actionBtn.style.borderStyle = 'dashed';
                
                // Abilita il Drag & Drop (Desktop & Mobile)
                actionBtn.setAttribute('draggable', 'true');
                actionBtn.ondragstart = (e) => {
                    e.dataTransfer.setData('text/plain', 'new-patch');
                    actionBtn.classList.add('dragging');
                };
                actionBtn.ondragend = () => {
                    actionBtn.classList.remove('dragging');
                };
                
                actionBtn.ontouchstart = (e) => {
                    handleTouchStart(e, 'new-patch');
                };
                actionBtn.ontouchmove = (e) => {
                    handleTouchMove(e);
                };
                actionBtn.ontouchend = (e) => {
                    handleTouchEnd(e);
                };
            }
        }

        function aggiungiPatchCorrente() {
            aggiungiPatchInPosizione(-1);
        }

        function aggiungiPatchInPosizione(toIndex) {
            if (activePresetNum === null || !activeConcert || !activeConcert.songs[currentSongIndex]) return;
            const song = activeConcert.songs[currentSongIndex];
            if (!song.patches) song.patches = [];
            
            const keyboardName = getActiveKeyboardName() || "Tastiera Generica";
            
            // Inizializza la struttura a dizionari se assente
            if (!patchLookup.keyboards) patchLookup.keyboards = {};
            if (!patchLookup.keyboards[keyboardName]) patchLookup.keyboards[keyboardName] = { patches: {} };
            
            let nomePatch = patchLookup.keyboards[keyboardName].patches[activePresetNum];
            if (!nomePatch) {
                nomePatch = prompt(`Nuovo preset rilevato (${activePresetNum}) per ${keyboardName}. Inserisci il nome per questa patch:`);
                if (!nomePatch || nomePatch.trim() === "") {
                    logToTerminal("Aggiunta annullata: il nome della patch non può essere vuoto.", "warning");
                    return;
                }
                nomePatch = nomePatch.trim();
                
                // Salva nella lookup in memoria
                patchLookup.keyboards[keyboardName].patches[activePresetNum] = nomePatch;
                
                // Salva le patchLookup in localStorage
                try {
                    localStorage.setItem('midiLive_patchLookup', JSON.stringify(patchLookup));
                    logToTerminal(`Impostazioni salvate: Registrata patch ${activePresetNum} per "${keyboardName}" come "${nomePatch}".`, "success");
                } catch(err) {
                    console.error("Errore salvataggio patchLookup:", err);
                }
            }
            
            // Aggiungi la patch alla canzone alla posizione corretta
            const newPatchObj = { presetNum: activePresetNum };
            if (toIndex === -1 || toIndex >= song.patches.length) {
                song.patches.push(newPatchObj);
            } else {
                song.patches.splice(toIndex, 0, newPatchObj);
            }
            
            // Salva il database in localStorage
            try {
                localStorage.setItem('midiLive_database', JSON.stringify(database));
                logToTerminal(`Patch "${nomePatch}" (PC ${activePresetNum}) aggiunta alla canzone "${song.title}" in posizione ${toIndex === -1 ? song.patches.length : toIndex + 1}.`, "success");
            } catch(err) {
                console.error("Errore salvataggio database:", err);
            }
            
            // Ridisegna e aggiorna il pulsante azione
            renderCurrentSong();
        }

        function eliminaPatch(index) {
            if (!activeConcert || !activeConcert.songs[currentSongIndex]) return;
            const song = activeConcert.songs[currentSongIndex];
            if (!song.patches || index < 0 || index >= song.patches.length) return;
            
            const [deletedPatch] = song.patches.splice(index, 1);
            
            // Se la patch eliminata era quella attiva, deselezionala
            if (activePresetNum === deletedPatch.presetNum) {
                activePresetNum = null;
            }
            
            // Salva in localStorage
            try {
                localStorage.setItem('midiLive_database', JSON.stringify(database));
                logToTerminal(`Patch PC ${deletedPatch.presetNum} eliminata dal brano "${song.title}".`, "info");
            } catch (err) {
                console.error("Errore salvataggio localStorage:", err);
            }
            
            // Ridisegna
            renderCurrentSong();
        }

        function getActiveKeyboardName() {
            const selectDiv = document.getElementById('midi-out-select');
            if (selectDiv && selectDiv.value && selectDiv.value !== "Nessuna tastiera" && selectDiv.value !== "Cerco tastiera...") {
                const option = selectDiv.options[selectDiv.selectedIndex];
                if (option && option.text !== "Nessuna tastiera" && option.text !== "Cerco tastiera...") {
                    return option.text;
                }
            }
            return null;
        }

        function getPatchName(presetNumber) {
            const keyboardName = getActiveKeyboardName();
            if (keyboardName) {
                if (patchLookup && patchLookup.keyboards && patchLookup.keyboards[keyboardName]) {
                    const name = patchLookup.keyboards[keyboardName].patches[presetNumber];
                    if (name) return name;
                }
            }
            
            // Fallback: se la tastiera attiva non ha questa patch o non è collegata,
            // cerchiamo tra tutti i modelli configurati
            if (patchLookup && patchLookup.keyboards) {
                for (const kb in patchLookup.keyboards) {
                    const name = patchLookup.keyboards[kb].patches[presetNumber];
                    if (name) return name;
                }
            }
            
            return `Preset #${presetNumber}`;
        }

        function checkAndMigrateLocalLookup() {
            const keyboardName = getActiveKeyboardName();
            if (!keyboardName) return; // Nessuna tastiera attiva, migrazione differita
            
            const rawLocalLookup = localStorage.getItem('midiLive_patchLookup');
            if (!rawLocalLookup) return;
            
            try {
                let localLookup = JSON.parse(rawLocalLookup);
                
                // Se è un oggetto piatto (non ha il nodo "keyboards")
                if (localLookup && typeof localLookup === 'object' && !localLookup.keyboards) {
                    const keys = Object.keys(localLookup);
                    if (keys.length === 0) return;
                    
                    const isFlat = keys.every(key => !isNaN(key) || key === "Tastiera Temporanea");
                    if (isFlat) {
                        logToTerminal(`Migrazione database: Rilevato formato legacy. Trasferimento patch personalizzate a "${keyboardName}"...`, "system");
                        
                        // Costruisci il nuovo formato nidificato
                        const newLookup = {
                            keyboards: {
                                [keyboardName]: {
                                    patches: localLookup
                                }
                            }
                        };
                        
                        localStorage.setItem('midiLive_patchLookup', JSON.stringify(newLookup));
                        
                        // Pulisci e unisci in memoria
                        if (!patchLookup.keyboards) patchLookup.keyboards = {};
                        if (!patchLookup.keyboards[keyboardName]) patchLookup.keyboards[keyboardName] = { patches: {} };
                        Object.assign(patchLookup.keyboards[keyboardName].patches, localLookup);
                        
                        // Rimuovi la tastiera fittizia temporanea se presente
                        if (patchLookup.keyboards["Tastiera Temporanea"]) {
                            delete patchLookup.keyboards["Tastiera Temporanea"];
                        }
                        
                        logToTerminal("Migrazione completata con successo!", "success");
                    }
                }
            } catch (err) {
                console.error("Errore durante la migrazione locale di patchLookup:", err);
            }
        }

        function onKeyboardSelectChange() {
            checkAndMigrateLocalLookup();
            if (activeConcert) {
                renderCurrentSong();
            }
        }

        function chiediNomePatch(presetNum, keyboardName) {
            return new Promise((resolve) => {
                const modal = document.getElementById('patch-name-modal');
                const title = document.getElementById('modal-title');
                const subtitle = document.getElementById('modal-subtitle');
                const input = document.getElementById('modal-input-name');
                
                title.innerText = "Nuovo Suono Rilevato";
                subtitle.innerText = `Inserisci il nome per il preset ${presetNum} di "${keyboardName}":`;
                input.value = "";
                modal.style.display = 'flex';
                input.focus();
                
                // Gestione tasti di invio o fuga
                input.onkeydown = (e) => {
                    if (e.key === "Enter") {
                        chiudiModalPatch(true);
                    } else if (e.key === "Escape") {
                        chiudiModalPatch(false);
                    }
                };
                
                window.modalResolve = (confermato) => {
                    modal.style.display = 'none';
                    if (confermato) {
                        resolve(input.value.trim());
                    } else {
                        resolve(null);
                    }
                };
            });
        }
        
        function chiudiModalPatch(confermato) {
            if (window.modalResolve) {
                window.modalResolve(confermato);
            }
            // Riconnetti automaticamente il MIDI dopo la chiusura della tastiera virtuale del tablet
            setTimeout(() => {
                inizializzaMidi();
            }, 300);
        }
 
         // ==========================================
        // GESTIONE MIDI (Motore collaudato con Input Monitor)
        // ==========================================
        function inizializzaMidi() {
            logToTerminal("Tentativo di connessione MIDI in corso...", "system");
            if (navigator.requestMIDIAccess) {
                navigator.requestMIDIAccess().then(onMIDISuccess, onMIDIFailure);
            } else {
                updateStatus("MIDI Non Supportato", "#ae2012");
                logToTerminal("Errore: Il browser non supporta Web MIDI API.", "error");
            }
        }

        // ==========================================
        // GESTIONE MONITOR TERMINALE
        // ==========================================
        function logToTerminal(message, type = 'info') {
            const termBody = document.getElementById('terminal-body');
            if (!termBody) return;
            
            const time = new Date().toLocaleTimeString();
            const entry = document.createElement('div');
            entry.className = `terminal-line ${type}`;
            entry.innerHTML = `<span class="term-time">[${time}]</span><span class="term-msg">${message}</span>`;
            
            termBody.appendChild(entry);
            
            // Evita l'accumulo di troppi log per mantenere fluide le performance
            while (termBody.children.length > 100) {
                termBody.removeChild(termBody.firstChild);
            }
            
            // Auto scroll to bottom
            termBody.scrollTop = termBody.scrollHeight;
        }

        function clearTerminal() {
            const termBody = document.getElementById('terminal-body');
            if (termBody) {
                termBody.innerHTML = `<div class="terminal-line system"><span class="term-time">[${new Date().toLocaleTimeString()}]</span>Terminale cancellato. In attesa...</div>`;
            }
        }

        function getNoteName(midiNote) {
            const notes = ["Do", "Do#", "Re", "Re#", "Mi", "Fa", "Fa#", "Sol", "Sol#", "La", "La#", "Si"];
            const octave = Math.floor(midiNote / 12) - 1;
            const note = notes[midiNote % 12];
            return `${note}${octave}`;
        }

        function handleMidiInputMessage(event) {
            const data = event.data;
            if (!data || data.length === 0) return;
            
            const statusByte = data[0];
            const channel = (statusByte & 0x0F) + 1;
            const messageType = statusByte & 0xF0;
            
            const hexBytes = Array.from(data).map(b => "0x" + b.toString(16).toUpperCase().padStart(2, '0')).join(', ');
            
            let infoStr = "";
            let logType = "info";
            
            // Filtra i messaggi ad alta frequenza come MIDI Clock (0xF8) e Active Sensing (0xFE)
            if (statusByte === 0xF8 || statusByte === 0xFE) return;
            
            if (messageType === 0x90 && data[2] > 0) {
                // Note On
                const noteName = getNoteName(data[1]);
                infoStr = `RX: Note On - Ch ${channel} | Nota: ${noteName} (${data[1]}), Vel: ${data[2]}`;
            } else if (messageType === 0x80 || (messageType === 0x90 && data[2] === 0)) {
                // Note Off
                const noteName = getNoteName(data[1]);
                infoStr = `RX: Note Off - Ch ${channel} | Nota: ${noteName} (${data[1]})`;
            } else if (messageType === 0xB0) {
                // Control Change
                const ccNumber = data[1];
                const ccValue = data[2];
                let ccName = `CC #${ccNumber}`;
                if (ccNumber === 7) {
                    ccName = "Volume generale (CC #7)";
                    logType = "warning"; // Colore arancione evidenziato
                } else if (ccNumber === 11) {
                    ccName = "Espressione (CC #11)";
                    logType = "warning";
                } else if (ccNumber === 64) {
                    ccName = "Pedale Sustain (CC #64)";
                } else if (ccNumber === 1) {
                    ccName = "Modulation Wheel (CC #1)";
                }
                infoStr = `RX: ${ccName} - Ch ${channel} | Valore: ${ccValue}`;
            } else if (messageType === 0xC0) {
                // Program Change
                const displayedPC = data[1] + 1;
                infoStr = `RX: Program Change - Ch ${channel} | PC: ${displayedPC}`;
                logType = "system";
                sincronizzaMidiInputConGUI(displayedPC);
            } else if (messageType === 0xE0) {
                // Pitch Bend
                const val = data[1] + (data[2] << 7);
                infoStr = `RX: Pitch Bend - Ch ${channel} | Valore: ${val}`;
            } else {
                infoStr = `RX: Messaggio 0x${statusByte.toString(16).toUpperCase()} - Ch ${channel}`;
                logType = "system";
            }
            
            logToTerminal(`${infoStr} <span style="color: #555566; font-size: 11px; font-family: monospace;">[${hexBytes}]</span>`, logType);
        }

        function collegaInputMidi() {
            if (!globalMidiAccess) return;
            let inputsCount = 0;
            for (let input of globalMidiAccess.inputs.values()) {
                input.onmidimessage = handleMidiInputMessage;
                inputsCount++;
            }
        }

        function onMIDISuccess(midiAccess) {
            globalMidiAccess = midiAccess;
            aggiornaPorte();
            collegaInputMidi();
            logToTerminal("Accesso MIDI configurato con successo.", "system");
            
            const connBtn = document.getElementById('btn-connetti-midi');
            if (connBtn) {
                connBtn.innerText = "MIDI ATTIVO";
                connBtn.style.background = "#2a9d8f";
                connBtn.style.color = "#fff";
                connBtn.style.cursor = "default";
                connBtn.disabled = true;
            }

            midiAccess.onstatechange = (e) => {
                try {
                    aggiornaPorte();
                    collegaInputMidi();
                    const portName = (e.port && e.port.name) ? e.port.name : "Dispositivo Sconosciuto";
                    const portState = (e.port && e.port.state) ? e.port.state : "sconosciuto";
                    logToTerminal(`Porta MIDI modificata: ${portName} (${portState})`, "info");
                } catch (err) {
                    console.error("Errore in onstatechange:", err);
                }
            };
        }

        function onMIDIFailure(error) {
            updateStatus("MIDI Negato", "#ae2012");
            const details = error ? ` (${error.name || error.message || error})` : "";
            logToTerminal(`Impossibile accedere ai dispositivi MIDI${details}. Clicca sul pulsante 'CONNETTI MIDI' in alto per abilitare i permessi.`, "error");
            
            const connBtn = document.getElementById('btn-connetti-midi');
            if (connBtn) {
                connBtn.innerText = "RIPROVA CONNETTI";
                connBtn.style.background = "#e76f51";
                connBtn.style.color = "#fff";
                connBtn.disabled = false;
            }
        }

        let lastMidiOutputsHash = "";
        function aggiornaPorte() {
            if (!globalMidiAccess) return;
            const selectDiv = document.getElementById('midi-out-select');
            if (!selectDiv) return;
            
            const prevValue = selectDiv.value;
            selectDiv.innerHTML = ''; 
            let count = 0;
            let outputNames = [];

            for (let output of globalMidiAccess.outputs.values()) {
                const option = document.createElement('option');
                option.value = output.id;
                option.text = output.name;
                if (output.id === prevValue) {
                    option.selected = true;
                }
                selectDiv.appendChild(option);
                count++;
                outputNames.push(`${output.name} (${output.state})`);
            }
            
            const currentHash = outputNames.join('|');
            if (currentHash !== lastMidiOutputsHash) {
                lastMidiOutputsHash = currentHash;
                outputNames.forEach(name => {
                    logToTerminal(`Dispositivo MIDI rilevato: ${name}`, "info");
                });
                
                // Esegui la migrazione dei dati locali per il dispositivo connesso
                checkAndMigrateLocalLookup();
                if (activeConcert) {
                    renderCurrentSong();
                }
            }

            if (count === 0) {
                selectDiv.innerHTML = '<option>Nessuna tastiera</option>';
                if (lastMidiOutputsHash !== "empty") {
                    lastMidiOutputsHash = "empty";
                    logToTerminal("Nessun dispositivo MIDI output rilevato.", "warning");
                }
                
                // Sblocca il pulsante di connessione per consentire la riconnessione manuale
                const connBtn = document.getElementById('btn-connetti-midi');
                if (connBtn) {
                    connBtn.innerText = "RICONNETTI MIDI";
                    connBtn.style.background = "var(--accent)";
                    connBtn.style.color = "#000";
                    connBtn.style.cursor = "pointer";
                    connBtn.disabled = false;
                }
            }
        }

        function sendPC(presetNumber) {
            if (!globalMidiAccess) {
                logToTerminal("MIDI non disponibile o non autorizzato.", "error");
                return;
            }
            const portId = document.getElementById('midi-out-select').value;
            const outputPort = globalMidiAccess.outputs.get(portId);
            
            let patchName = getPatchName(presetNumber);
            
            if (outputPort) {
                const channelOffset = parseInt(document.getElementById('midi-channel').value);
                const statusByte = 0xC0 + channelOffset; 
                
                // Mappa il numero di preset (1-indexed nel file) a MIDI Program Change (0-indexed)
                const midiValue = Math.max(0, Math.min(127, presetNumber - 1));
                outputPort.send([statusByte, midiValue]);
                
                const hexStatus = "0x" + statusByte.toString(16).toUpperCase();
                const hexPreset = "0x" + midiValue.toString(16).toUpperCase().padStart(2, '0');
                logToTerminal(`TX: [${hexStatus}, ${hexPreset}] - Canale ${channelOffset + 1} - PC ${presetNumber} ("${patchName}") -> ${outputPort.name}`, "success");
                
                updateStatus(`Inviato PC ${presetNumber}`, "#a7c957");
                setTimeout(() => updateStatus("Pronto", "#a7c957"), 1000);
            } else {
                logToTerminal(`Errore: Nessun dispositivo selezionato o tastiera disconnessa (PC ${presetNumber})`, "error");
            }
        }

        function aggiornaApplicazione() {
            logToTerminal("Forzatura aggiornamento applicazione in corso...", "system");
            window.location.href = window.location.origin + window.location.pathname + '?_t=' + Date.now();
        }

        function updateStatus(text, color) {
            const ind = document.getElementById('status-indicator');
            ind.innerText = text;
            ind.style.color = color;
        }

        // Avvia l'applicazione caricando il database
        window.onload = () => {
            const versionEl = document.getElementById('app-version');
            if (versionEl) {
                versionEl.innerText = `v${APP_VERSION}`;
            }
            loadDatabase();
            inizializzaMidi();
        };

    </script>
