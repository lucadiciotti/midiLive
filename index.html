<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
    <title>Numa Live Controller</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#121212">
    <meta name="mobile-web-app-capable" content="yes">
    <style>
        :root {
            --bg: #121212;
            --surface: #1e1e1e;
            --primary: #2a9d8f;
            --primary-dark: #21867a;
            --accent: #e9c46a;
            --text: #ffffff;
            --text-muted: #aaaaaa;
        }
        
        * { box-sizing: border-box; }
        body { font-family: sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        
        /* HEADER: Stato MIDI */
        header { background: #000; padding: 10px; border-bottom: 1px solid #333; display: flex; flex-wrap: wrap; gap: 10px; align-items: center; justify-content: space-between; font-size: 14px; }
        .midi-controls { display: flex; gap: 10px; flex: 1; }
        select { background: #333; color: white; border: 1px solid #555; padding: 5px; border-radius: 4px; }
        #status-indicator { color: #ee9b00; font-weight: bold; }

        /* CONTENITORE PRINCIPALE */
        #main-container { flex: 1; padding: 15px; display: flex; flex-direction: column; overflow: hidden; }
        
        /* VISTA 1: Lista Concerti */
        #view-concerts { display: none; flex-direction: column; gap: 15px; height: 67%; overflow-y: auto; min-height: 0; }
        .concert-card { background: var(--surface); padding: 25px; border-radius: 12px; font-size: 20px; text-align: center; border: 2px solid #333; cursor: pointer; transition: 0.2s; }
        .concert-card:active { border-color: var(--primary); background: #2a2a2a; }

        /* VISTA 2: Modalità Live */
        #view-live { display: none; flex-direction: column; height: 67%; overflow: hidden; min-height: 0; }
        .live-controls-wrapper { height: 100%; display: flex; flex-direction: column; min-height: 0; }
        .song-header { text-align: center; margin-bottom: 15px; }
        .song-title { font-size: 28px; font-weight: bold; margin: 0; color: var(--accent); }
        .song-index { font-size: 14px; color: var(--text-muted); }

        #patches-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 15px; flex: 1; align-content: start; overflow-y: auto; padding-right: 5px; }
        
        .pad { background: var(--primary); border: 2px solid var(--primary-dark); padding: 20px 10px; font-size: 20px; color: white; border-radius: 12px; text-align: center; cursor: pointer; user-select: none; box-shadow: 0 4px 6px rgba(0,0,0,0.3); transition: transform 0.1s, background-color 0.2s; }
        .pad:active { background: var(--accent); border-color: #f4a261; color: #000; transform: translateY(2px); }
        .preset-number { font-size: 14px; opacity: 0.9; display: block; margin-top: 8px; font-family: monospace; }

        /* NAVIGAZIONE INFERIORE */
        .live-nav { display: flex; justify-content: space-between; padding-top: 10px; margin-top: auto; border-top: 1px solid #333; margin-bottom: 5px; }
        .nav-btn { background: var(--surface); color: white; border: 1px solid #555; padding: 12px 15px; border-radius: 8px; font-size: 16px; cursor: pointer; flex: 1; margin: 0 5px; text-align: center; }
        .nav-btn:active { background: #444; }
        .nav-btn.primary { background: #005f73; border-color: #0a9396; }

        /* MONITOR TERMINALE IN BASSO */
        .terminal-wrapper {
            height: 33%;
            display: flex;
            flex-direction: column;
            background: #08080c;
            border: 2px solid #222;
            border-radius: 8px;
            overflow: hidden;
            min-height: 0;
            margin-top: 10px;
            font-family: 'Courier New', Courier, monospace;
            box-shadow: inset 0 0 15px rgba(0,0,0,0.9), 0 4px 10px rgba(0,0,0,0.5);
        }
        .terminal-header {
            background: #12121a;
            padding: 8px 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #222;
        }
        .terminal-title {
            font-size: 11px;
            font-weight: bold;
            color: #888;
            letter-spacing: 1.5px;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .terminal-title::before {
            content: '';
            display: inline-block;
            width: 8px;
            height: 8px;
            background: #39ff14;
            border-radius: 50%;
            box-shadow: 0 0 8px #39ff14;
            animation: pulse-glow 1.5s infinite;
        }
        @keyframes pulse-glow {
            0% { opacity: 0.4; }
            50% { opacity: 1; }
            100% { opacity: 0.4; }
        }
        .terminal-clear {
            background: transparent;
            border: 1px solid #444;
            color: #aaa;
            padding: 2px 8px;
            font-size: 10px;
            border-radius: 4px;
            cursor: pointer;
            font-family: inherit;
            transition: all 0.2s;
        }
        .terminal-clear:hover {
            border-color: #ff3333;
            color: #ff3333;
            background: rgba(255, 51, 51, 0.1);
        }
        .terminal-body {
            flex: 1;
            padding: 10px;
            overflow-y: auto;
            font-size: 13px;
            line-height: 1.4;
            display: flex;
            flex-direction: column;
            gap: 4px;
        }
        .terminal-body::-webkit-scrollbar {
            width: 6px;
        }
        .terminal-body::-webkit-scrollbar-track {
            background: rgba(0, 0, 0, 0.2);
        }
        .terminal-body::-webkit-scrollbar-thumb {
            background: #333;
            border-radius: 3px;
        }
        .terminal-body::-webkit-scrollbar-thumb:hover {
            background: #555;
        }
        .terminal-line {
            word-break: break-all;
        }
        .terminal-line.info { color: #00f0ff; }
        .terminal-line.success { color: #39ff14; text-shadow: 0 0 2px rgba(57, 255, 20, 0.3); }
        .terminal-line.error { color: #ff3333; text-shadow: 0 0 2px rgba(255, 51, 51, 0.3); }
        .terminal-line.warning { color: #ffaa00; }
        .terminal-line.system { color: #888899; }
        .term-time { color: #555566; margin-right: 6px; }
    </style>
</head>
<body>

    <header>
        <div class="midi-controls">
            <select id="midi-out-select"><option>Cerco tastiera...</option></select>
            <select id="midi-channel">
                <script>for(let i=0; i<16; i++) document.write(`<option value="${i}">CH ${i+1}</option>`);</script>
            </select>
        </div>
        <div style="display: flex; flex-direction: column; align-items: flex-end; gap: 2px;">
            <div id="status-indicator">In attesa...</div>
            <div id="app-version" style="font-size: 10px; color: #666; font-family: monospace; letter-spacing: 0.5px;">v0.0.0</div>
        </div>
    </header>

    <div id="main-container">
        <div id="view-concerts">
            <h2 style="text-align:center; margin-top:0;">Seleziona Concerto</h2>
            <div id="concerts-list"></div>
        </div>

        <div id="view-live">
            <div class="live-controls-wrapper">
                <div class="song-header">
                    <h2 id="current-song-title" class="song-title">Titolo Canzone</h2>
                    <div id="song-counter" class="song-index">Brano 1 di X</div>
                </div>
                
                <div id="patches-grid"></div>

                <div class="live-nav">
                    <div class="nav-btn" onclick="changeSong(-1)">◄ Brano Prec</div>
                    <div class="nav-btn primary" onclick="showConcerts()">Cambia Live</div>
                    <div class="nav-btn" onclick="changeSong(1)">Brano Succ ►</div>
                </div>
            </div>
        </div>

        <div class="terminal-wrapper">
            <div class="terminal-header">
                <span class="terminal-title">MIDI MONITOR LOG</span>
                <button class="terminal-clear" onclick="clearTerminal()">CANCELLA</button>
            </div>
            <div id="terminal-body" class="terminal-body">
                <div class="terminal-line system"><span class="term-time"></span>Terminale pronto. In attesa di comandi MIDI...</div>
            </div>
        </div>
    </div>

    <script>
        // ==========================================
        // STATO DELL'APPLICAZIONE
        // ==========================================
        const APP_VERSION = "2026.07.09-2213";
        let database = null;
        let activeConcert = null;
        let currentSongIndex = 0;
        let globalMidiAccess = null;

        // ==========================================
        // GESTIONE DATI (JSON)
        // ==========================================
        async function loadDatabase() {
            try {
                updateStatus("Caricamento scalette...", "#ee9b00");
                // Attenzione: su file:/// locale la fetch fallisce per CORS. Su GitHub Pages funzionerà.
                const response = await fetch('setlists.json?_t=' + Date.now()); 
                if (!response.ok) throw new Error("File setlists.json non trovato");
                
                database = await response.json();
                showConcerts();
                updateStatus("Dati caricati", "#a7c957");
            } catch (error) {
                updateStatus("Errore JSON!", "#ae2012");
                alert("Impossibile caricare setlists.json. Assicurati di aver pushato il file su GitHub e di usare la versione HTTPS.\n\n" + error.message);
            }
        }

        // ==========================================
        // GESTIONE INTERFACCIA UTENTE
        // ==========================================
        function showConcerts() {
            document.getElementById('view-live').style.display = 'none';
            document.getElementById('view-concerts').style.display = 'flex';
            
            const list = document.getElementById('concerts-list');
            list.innerHTML = ''; // Svuota
            
            database.concerts.forEach((concert, index) => {
                const card = document.createElement('div');
                card.className = 'concert-card';
                card.innerHTML = `<strong>${concert.name}</strong><br><small>${concert.songs.length} brani</small>`;
                card.onclick = () => startConcert(index);
                list.appendChild(card);
            });
        }

        function startConcert(concertIndex) {
            activeConcert = database.concerts[concertIndex];
            currentSongIndex = 0;
            document.getElementById('view-concerts').style.display = 'none';
            document.getElementById('view-live').style.display = 'flex';
            renderCurrentSong();
        }

        function renderCurrentSong() {
            const song = activeConcert.songs[currentSongIndex];
            
            // Aggiorna Intestazione
            document.getElementById('current-song-title').innerText = song.title;
            document.getElementById('song-counter').innerText = `Brano ${currentSongIndex + 1} di ${activeConcert.songs.length}`;

            // Genera i Pad delle Patch
            const grid = document.getElementById('patches-grid');
            grid.innerHTML = '';
            
            if(song.patches && song.patches.length > 0) {
                song.patches.forEach(patch => {
                    const btn = document.createElement('div');
                    btn.className = 'pad';
                    btn.innerHTML = `${patch.name} <span class="preset-number">PC: ${patch.presetNum}</span>`;
                    btn.onclick = () => sendPC(patch.presetNum);
                    grid.appendChild(btn);
                });
            } else {
                grid.innerHTML = '<div style="width:100%; text-align:center; color:#aaa;">Nessuna patch per questo brano.</div>';
            }
        }

        function changeSong(direction) {
            const newIndex = currentSongIndex + direction;
            if (newIndex >= 0 && newIndex < activeConcert.songs.length) {
                currentSongIndex = newIndex;
                renderCurrentSong();
            }
        }

        // ==========================================
        // GESTIONE MIDI (Motore collaudato con Input Monitor)
        // ==========================================
        function inizializzaMidi() {
            logToTerminal("Tentativo di connessione MIDI in corso...", "system");
            if (navigator.requestMIDIAccess) {
                navigator.requestMIDIAccess().then(onMIDISuccess, onMIDIFailure);
            } else {
                updateStatus("MIDI Non Supportato", "#ae2012");
                logToTerminal("Errore: Il browser non supporta Web MIDI API.", "error");
            }
        }

        // ==========================================
        // GESTIONE MONITOR TERMINALE
        // ==========================================
        function logToTerminal(message, type = 'info') {
            const termBody = document.getElementById('terminal-body');
            if (!termBody) return;
            
            const time = new Date().toLocaleTimeString();
            const entry = document.createElement('div');
            entry.className = `terminal-line ${type}`;
            entry.innerHTML = `<span class="term-time">[${time}]</span><span class="term-msg">${message}</span>`;
            
            termBody.appendChild(entry);
            
            // Evita l'accumulo di troppi log per mantenere fluide le performance
            while (termBody.children.length > 100) {
                termBody.removeChild(termBody.firstChild);
            }
            
            // Auto scroll to bottom
            termBody.scrollTop = termBody.scrollHeight;
        }

        function clearTerminal() {
            const termBody = document.getElementById('terminal-body');
            if (termBody) {
                termBody.innerHTML = `<div class="terminal-line system"><span class="term-time">[${new Date().toLocaleTimeString()}]</span>Terminale cancellato. In attesa...</div>`;
            }
        }

        function getNoteName(midiNote) {
            const notes = ["Do", "Do#", "Re", "Re#", "Mi", "Fa", "Fa#", "Sol", "Sol#", "La", "La#", "Si"];
            const octave = Math.floor(midiNote / 12) - 1;
            const note = notes[midiNote % 12];
            return `${note}${octave}`;
        }

        function handleMidiInputMessage(event) {
            const data = event.data;
            if (!data || data.length === 0) return;
            
            const statusByte = data[0];
            const channel = (statusByte & 0x0F) + 1;
            const messageType = statusByte & 0xF0;
            
            const hexBytes = Array.from(data).map(b => "0x" + b.toString(16).toUpperCase().padStart(2, '0')).join(', ');
            
            let infoStr = "";
            let logType = "info";
            
            // Filtra i messaggi ad alta frequenza come MIDI Clock (0xF8) e Active Sensing (0xFE)
            if (statusByte === 0xF8 || statusByte === 0xFE) return;
            
            if (messageType === 0x90 && data[2] > 0) {
                // Note On
                const noteName = getNoteName(data[1]);
                infoStr = `RX: Note On - Ch ${channel} | Nota: ${noteName} (${data[1]}), Vel: ${data[2]}`;
            } else if (messageType === 0x80 || (messageType === 0x90 && data[2] === 0)) {
                // Note Off
                const noteName = getNoteName(data[1]);
                infoStr = `RX: Note Off - Ch ${channel} | Nota: ${noteName} (${data[1]})`;
            } else if (messageType === 0xB0) {
                // Control Change
                const ccNumber = data[1];
                const ccValue = data[2];
                let ccName = `CC #${ccNumber}`;
                if (ccNumber === 7) {
                    ccName = "Volume generale (CC #7)";
                    logType = "warning"; // Colore arancione evidenziato
                } else if (ccNumber === 11) {
                    ccName = "Espressione (CC #11)";
                    logType = "warning";
                } else if (ccNumber === 64) {
                    ccName = "Pedale Sustain (CC #64)";
                } else if (ccNumber === 1) {
                    ccName = "Modulation Wheel (CC #1)";
                }
                infoStr = `RX: ${ccName} - Ch ${channel} | Valore: ${ccValue}`;
            } else if (messageType === 0xC0) {
                // Program Change
                const displayedPC = data[1] + 1;
                infoStr = `RX: Program Change - Ch ${channel} | PC: ${displayedPC}`;
                logType = "system";
            } else if (messageType === 0xE0) {
                // Pitch Bend
                const val = data[1] + (data[2] << 7);
                infoStr = `RX: Pitch Bend - Ch ${channel} | Valore: ${val}`;
            } else {
                infoStr = `RX: Messaggio 0x${statusByte.toString(16).toUpperCase()} - Ch ${channel}`;
                logType = "system";
            }
            
            logToTerminal(`${infoStr} <span style="color: #555566; font-size: 11px; font-family: monospace;">[${hexBytes}]</span>`, logType);
        }

        function collegaInputMidi() {
            if (!globalMidiAccess) return;
            let inputsCount = 0;
            for (let input of globalMidiAccess.inputs.values()) {
                input.onmidimessage = handleMidiInputMessage;
                inputsCount++;
            }
        }

        function onMIDISuccess(midiAccess) {
            globalMidiAccess = midiAccess;
            aggiornaPorte();
            collegaInputMidi();
            logToTerminal("Accesso MIDI configurato con successo.", "system");
            midiAccess.onstatechange = (e) => {
                aggiornaPorte();
                collegaInputMidi();
                logToTerminal(`Porta MIDI modificata: ${e.port.name} (${e.port.state})`, "info");
            };
        }

        function onMIDIFailure() {
            updateStatus("MIDI Negato", "#ae2012");
            logToTerminal("Impossibile accedere ai dispositivi MIDI. Verifica i permessi del browser.", "error");
        }

        let lastMidiOutputsHash = "";
        function aggiornaPorte() {
            const selectDiv = document.getElementById('midi-out-select');
            if (!selectDiv) return;
            selectDiv.innerHTML = ''; 
            let count = 0;
            let outputNames = [];

            for (let output of globalMidiAccess.outputs.values()) {
                const option = document.createElement('option');
                option.value = output.id;
                option.text = output.name;
                selectDiv.appendChild(option);
                count++;
                outputNames.push(`${output.name} (${output.state})`);
            }
            
            const currentHash = outputNames.join('|');
            if (currentHash !== lastMidiOutputsHash) {
                lastMidiOutputsHash = currentHash;
                outputNames.forEach(name => {
                    logToTerminal(`Dispositivo MIDI rilevato: ${name}`, "info");
                });
            }

            if (count === 0) {
                selectDiv.innerHTML = '<option>Nessuna tastiera</option>';
                if (lastMidiOutputsHash !== "empty") {
                    lastMidiOutputsHash = "empty";
                    logToTerminal("Nessun dispositivo MIDI output rilevato.", "warning");
                }
            }
        }

        function sendPC(presetNumber) {
            if (!globalMidiAccess) {
                logToTerminal("MIDI non disponibile o non autorizzato.", "error");
                return;
            }
            const portId = document.getElementById('midi-out-select').value;
            const outputPort = globalMidiAccess.outputs.get(portId);
            
            let patchName = `Preset #${presetNumber}`;
            if (activeConcert && activeConcert.songs[currentSongIndex]) {
                const song = activeConcert.songs[currentSongIndex];
                const patch = song.patches.find(p => p.presetNum === presetNumber);
                if (patch) {
                    patchName = patch.name;
                }
            }
            
            if (outputPort) {
                const channelOffset = parseInt(document.getElementById('midi-channel').value);
                const statusByte = 0xC0 + channelOffset; 
                
                // Mappa il numero di preset (1-indexed nel file) a MIDI Program Change (0-indexed)
                const midiValue = Math.max(0, Math.min(127, presetNumber - 1));
                outputPort.send([statusByte, midiValue]);
                
                const hexStatus = "0x" + statusByte.toString(16).toUpperCase();
                const hexPreset = "0x" + midiValue.toString(16).toUpperCase().padStart(2, '0');
                logToTerminal(`TX: [${hexStatus}, ${hexPreset}] - Canale ${channelOffset + 1} - PC ${presetNumber} ("${patchName}") -> ${outputPort.name}`, "success");
                
                updateStatus(`Inviato PC ${presetNumber}`, "#a7c957");
                setTimeout(() => updateStatus("Pronto", "#a7c957"), 1000);
            } else {
                logToTerminal(`Errore: Nessun dispositivo selezionato o tastiera disconnessa (PC ${presetNumber})`, "error");
            }
        }

        function updateStatus(text, color) {
            const ind = document.getElementById('status-indicator');
            ind.innerText = text;
            ind.style.color = color;
        }

        // Avvia l'applicazione caricando il database
        window.onload = () => {
            const versionEl = document.getElementById('app-version');
            if (versionEl) {
                versionEl.innerText = `v${APP_VERSION}`;
            }
            loadDatabase();
            inizializzaMidi();
        };

    </script>
</body>
</html>
